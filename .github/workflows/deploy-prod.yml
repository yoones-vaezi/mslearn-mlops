name: Deploy model to online endpoint (PR comment)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  deploy-prod:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/deploy-prod')
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Azure SDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-ai-ml azure-identity

      - name: Sign in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: |
          az extension add -n ml -y

      - name: Detect Azure ML workspace
        id: detect
        run: |
          RG_NAME=$(az group list --query "[?starts_with(name,'rg-ai300-l')].name | [0]" -o tsv)
          if [ -z "$RG_NAME" ]; then
            echo "No resource group starting with rg-ai300-l found." >&2
            exit 1
          fi

          WS_NAME=$(az ml workspace list --resource-group "$RG_NAME" --query "[?starts_with(name,'mlw-ai300-l')].name | [0]" -o tsv)
          if [ -z "$WS_NAME" ]; then
            echo "No workspace starting with mlw-ai300-l found in $RG_NAME." >&2
            exit 1
          fi

          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          echo "resource_group=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "workspace=$WS_NAME" >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUBSCRIPTION_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy model to managed online endpoint
        id: deploy
        run: |
          RG="${{ steps.detect.outputs.resource_group }}"
          WS="${{ steps.detect.outputs.workspace }}"

          # Ensure endpoint exists
          az ml online-endpoint show --name diabetes-endpoint -g "$RG" -w "$WS" 2>/dev/null || \
            az ml online-endpoint create -f src/endpoint.yml -g "$RG" -w "$WS"

          # Delete failed deployment if it exists
          STATUS=$(az ml online-deployment show --name blue --endpoint-name diabetes-endpoint -g "$RG" -w "$WS" --query "provisioning_state" -o tsv 2>/dev/null) || true
          if [ "$STATUS" = "Failed" ]; then
            echo "Deleting failed deployment..."
            az ml online-deployment delete --name blue --endpoint-name diabetes-endpoint -g "$RG" -w "$WS" --yes
          fi

          # Create deployment
          az ml online-deployment create -f src/deployment.yml -g "$RG" -w "$WS" --all-traffic

      - name: Comment deployment result on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const body = [
              '🚀 Deployment workflow completed.',
              '',
              'The diabetes model has been deployed (or updated) on the managed online endpoint.',
              '',
              'Check the workflow run logs for the endpoint scoring URI and verify the endpoint in Azure Machine Learning studio.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
